name: Release

# Cut a GitHub Release when a version tag is pushed, e.g. `v0.1.0`.
# Consumers pin it with: drenv add github:Nitemaeric/dragon_input --tag v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Run tests
        run: ruby test/run.rb

      # Guard against tag/manifest drift: the tag (minus the leading `v`) must
      # match the version declared in drenv.toml.
      - name: Check tag matches drenv.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(grep -E '^version' drenv.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$tag" != "$version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match drenv.toml version '$version'" >&2
            exit 1
          fi
          echo "Releasing $GITHUB_REF_NAME (drenv.toml version $version)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The suite runs under DragonRuby's mruby-patched (the real runtime), not
      # MRI, so it catches mruby-only issues. The built binary only changes when
      # the pinned commit in build-mruby.sh changes, so key the cache on that
      # file; the binary isn't portable, hence runner.os/arch in the key.
      - name: Cache mruby-patched
        id: cache-mruby
        uses: actions/cache@v5
        with:
          path: tmp/mruby
          key: mruby-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('script/build-mruby.sh') }}

      - name: Install build dependencies
        if: steps.cache-mruby.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y build-essential bison

      - name: Set up Ruby (for rake)
        if: steps.cache-mruby.outputs.cache-hit != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build mruby-patched
        if: steps.cache-mruby.outputs.cache-hit != 'true'
        run: ./script/build-mruby.sh

      - name: Run tests
        run: ./script/test.sh
